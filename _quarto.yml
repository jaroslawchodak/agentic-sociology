project:
  type: book
  output-dir: _book

book:
  title: "Nowy warsztat socjologa"
  subtitle: "Systemy agentowe AI w procesie badawczym"
  author: "Jarosław Chodak"
  date: today
  date-format: "YYYY-MM-DD"
  language: pl
  search: true
  reader-mode: true
  page-footer:
    left: "Półwarsztat · Agentic AI dla socjologów"
    right: |
      Repozytorium na [GitHub](https://github.com/jaroslawchodak/agentic-sociology)
  sidebar:
    style: docked
    collapse-level: 2
    border: true
  chapters:
    - index.qmd
    - 01-wprowadzenie.qmd
    - 02-czym-jest-agent.qmd
    - 03-krajobraz.qmd
    - 04-jak-rozmawiac.qmd
    - 05-case-study-ess.qmd
    - 06-zastosowania.qmd
    - 07-friction.qmd
    - 08-zamkniecie.qmd

format:
  html:
    theme:
      light: litera
      dark: darkly
    toc: true
    toc-depth: 3
    toc-title: "Na tej stronie"
    number-sections: true
    number-depth: 2
    smooth-scroll: true
    code-overflow: wrap
    code-copy: true
    fontsize: "1.05em"
    linkcolor: "#0b3d91"
    mainfont: "Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    monofont: "JetBrains Mono, 'Fira Code', 'SF Mono', Consolas, monospace"
    mermaid:
      theme: neutral

lang: pl
